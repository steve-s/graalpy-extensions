name: Integration Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # TODO: enable more integration tests
        test_name: [ test_jbang_integration.py, test_maven_plugin.py, test_gradle_plugin.py ]

    steps:
      - name: Set integration tests flags
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "TEST_FLAGS=--skip-long-running" >> $GITHUB_ENV
          else
            echo "TEST_FLAGS=" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Java 21
        id: java21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set GRADLE_JAVA_HOME
        run: echo "GRADLE_JAVA_HOME=${{ steps.java21.outputs.path }}" >> $GITHUB_ENV

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'graalvm'
          java-version: '25-ea'

      - name: Setup Polyglot Maven bundle
        uses: ./.github/actions/setup-polyglot-mvn-repo

      - name: Run Maven package install
        run: mvn --batch-mode -DskipTests -Dgradle.java.home=$GRADLE_JAVA_HOME -s settings.xml package install

      - name: Install JBang
        if: matrix.test_name == 'test_jbang_integration.py'
        run: |
          curl -Ls https://sh.jbang.dev | bash
          echo "$HOME/.jbang/bin" >> $GITHUB_PATH

      - name: Run integration tests
        run: |
          mvn --batch-mode -s settings.xml exec:java@integration-tests \
              -Dgradle.java.home=$GRADLE_JAVA_HOME \
              -Dintegration.tests.args="${{ matrix.test_name }} $TEST_FLAGS"