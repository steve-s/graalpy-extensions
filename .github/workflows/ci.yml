name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # TODO: enable more integration tests
        test_name: [ test_gradle_plugin.py ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Java 21
        id: java21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set GRADLE_JAVA_HOME
        run: echo "GRADLE_JAVA_HOME=${{ steps.java21.outputs.path }}" >> $GITHUB_ENV

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'graalvm'
          java-version: '25-ea'

      - name: Setup Polyglot Maven bundle
        uses: ./.github/actions/setup-polyglot-mvn-repo

      - name: Run Maven package install
        run: mvn --batch-mode -DskipTests -Dgradle.java.home=$GRADLE_JAVA_HOME -s settings.xml package install

      - name: Run integration tests
        run: |
          mvn --batch-mode -s settings.xml exec:java@integration-tests \
              -Dgradle.java.home=$GRADLE_JAVA_HOME
              -Dintegration.tests.args="${{ matrix.test_name }}"